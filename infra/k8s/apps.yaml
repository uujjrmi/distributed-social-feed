apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: social-feed
spec:
  ports:
    - port: 8001
  selector:
    app: user-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: social-feed
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: social-feed/user-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001
          env:
            - name: PORT
              value: "8001"
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: social-feed-config
                  key: DATABASE_URL
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8001
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8001
---
