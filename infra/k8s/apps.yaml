apiVersion: v1
kind: Service
metadata:
  name: healing-agent
  namespace: social-feed
spec:
  ports:
    - port: 8005
  selector:
    app: healing-agent
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: healing-agent
  namespace: social-feed
spec:
  replicas: 1
  selector:
    matchLabels:
      app: healing-agent
  template:
    metadata:
      labels:
        app: healing-agent
    spec:
      serviceAccountName: healing-agent
      containers:
        - name: healing-agent
          image: social-feed/healing-agent:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8005
          env:
            - name: PORT
              value: "8005"
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: social-feed-config
                  key: DATABASE_URL
            - name: PROMETHEUS_URL
              valueFrom:
                configMapKeyRef:
                  name: social-feed-config
                  key: PROMETHEUS_URL
            - name: RUNTIME_MODE
              valueFrom:
                configMapKeyRef:
                  name: social-feed-config
                  key: RUNTIME_MODE
            - name: KUBERNETES_NAMESPACE
              valueFrom:
                configMapKeyRef:
                  name: social-feed-config
                  key: KUBERNETES_NAMESPACE
            - name: FEED_ADMIN_URL
              value: http://feed-service:8003
            - name: ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: social-feed-secrets
                  key: ADMIN_TOKEN
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8005
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8005
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: healing-agent
  namespace: social-feed

