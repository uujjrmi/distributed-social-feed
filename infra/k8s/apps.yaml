apiVersion: v1
kind: Service
metadata:
  name: feed-service
  namespace: social-feed
spec:
  ports:
    - port: 8003
  selector:
    app: feed-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: feed-service
  namespace: social-feed
spec:
  replicas: 2
  selector:
    matchLabels:
      app: feed-service
  template:
    metadata:
      labels:
        app: feed-service
    spec:
      containers:
        - name: feed-service
          image: social-feed/feed-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8003
          env:
            - name: PORT
              value: "8003"
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: social-feed-config
                  key: GO_DATABASE_URL
            - name: REDIS_ADDR
              valueFrom:
                configMapKeyRef:
                  name: social-feed-config
                  key: REDIS_ADDR
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: social-feed-config
                  key: KAFKA_BROKERS
            - name: POST_CREATED_TOPIC
              valueFrom:
                configMapKeyRef:
                  name: social-feed-config
                  key: POST_CREATED_TOPIC
            - name: CONSUMER_GROUP
              value: feed-service
            - name: ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: social-feed-secrets
                  key: ADMIN_TOKEN
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8003
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8003
---
