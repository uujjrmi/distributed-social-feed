apiVersion: v1
kind: Secret
metadata:
  name: social-feed-secrets
  namespace: social-feed
type: Opaque
stringData:
  POSTGRES_USER: app
  POSTGRES_PASSWORD: app
  POSTGRES_DB: social
  ADMIN_TOKEN: dev-admin-token
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: social-feed-config
  namespace: social-feed
data:
  DATABASE_URL: postgresql://app:app@postgres:5432/social
  GO_DATABASE_URL: postgres://app:app@postgres:5432/social?sslmode=disable
  REDIS_ADDR: redis:6379
  KAFKA_BROKERS: kafka:9092
  POST_CREATED_TOPIC: post.created.v1
  PROMETHEUS_URL: http://prometheus:9090
  RUNTIME_MODE: kubernetes
  KUBERNETES_NAMESPACE: social-feed
  HEALING_POLL_INTERVAL_SECONDS: "10"
  HEALING_CONFIDENCE_THRESHOLD: "0.75"
  HEALING_COOLDOWN_SECONDS: "120"

