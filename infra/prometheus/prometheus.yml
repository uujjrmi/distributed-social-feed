global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/alert-rules.yml

scrape_configs:
  - job_name: user-service
    static_configs:
      - targets: ["user-service:8001"]

  - job_name: post-service
    static_configs:
      - targets: ["post-service:8002"]

  - job_name: feed-service
    static_configs:
      - targets: ["feed-service:8003"]

  - job_name: notification-service
    static_configs:
      - targets: ["notification-service:8004"]

  - job_name: healing-agent
    static_configs:
      - targets: ["healing-agent:8005"]

  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

