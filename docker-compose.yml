services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-social}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  kafka:
    image: docker.redpanda.com/redpandadata/redpanda:v24.1.7
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://kafka:9092
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 30

  user-service:
    build: ./services/user-service
    environment:
      PORT: "8001"
      DATABASE_URL: ${DATABASE_URL:-postgresql://app:app@postgres:5432/social}
      METRICS_NAMESPACE: user_service
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy

  post-service:
    build: ./services/post-service
    environment:
      PORT: "8002"
      DATABASE_URL: ${GO_DATABASE_URL:-postgres://app:app@postgres:5432/social?sslmode=disable}
      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:9092}
      POST_CREATED_TOPIC: ${POST_CREATED_TOPIC:-post.created.v1}
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  feed-service:
    build: ./services/feed-service
    environment:
      PORT: "8003"
      DATABASE_URL: ${GO_DATABASE_URL:-postgres://app:app@postgres:5432/social?sslmode=disable}
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:9092}
      POST_CREATED_TOPIC: ${POST_CREATED_TOPIC:-post.created.v1}
      CONSUMER_GROUP: feed-service
      FEED_MAX_ITEMS: "500"
      ADMIN_TOKEN: ${ADMIN_TOKEN:-dev-admin-token}
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy

  notification-service:
    build: ./services/notification-service
    environment:
      PORT: "8004"
      DATABASE_URL: ${DATABASE_URL:-postgresql://app:app@postgres:5432/social}
      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:9092}
      POST_CREATED_TOPIC: ${POST_CREATED_TOPIC:-post.created.v1}
      CONSUMER_GROUP: notification-service
      METRICS_NAMESPACE: notification_service
    ports:
      - "8004:8004"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  healing-agent:
    build: ./services/healing-agent
    environment:
      PORT: "8005"
      DATABASE_URL: ${DATABASE_URL:-postgresql://app:app@postgres:5432/social}
      PROMETHEUS_URL: ${PROMETHEUS_URL:-http://prometheus:9090}
      RUNTIME_MODE: ${RUNTIME_MODE:-docker}
      KUBERNETES_NAMESPACE: ${KUBERNETES_NAMESPACE:-social-feed}
      HEALING_POLL_INTERVAL_SECONDS: ${HEALING_POLL_INTERVAL_SECONDS:-10}
      HEALING_CONFIDENCE_THRESHOLD: ${HEALING_CONFIDENCE_THRESHOLD:-0.75}
      HEALING_COOLDOWN_SECONDS: ${HEALING_COOLDOWN_SECONDS:-120}
      FEED_ADMIN_URL: http://feed-service:8003
      ADMIN_TOKEN: ${ADMIN_TOKEN:-dev-admin-token}
    ports:
      - "8005:8005"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      prometheus:
        condition: service_started

  demo-ui:
    build: ./services/demo-ui
    environment:
      PORT: "8080"
      DATABASE_URL: ${DATABASE_URL:-postgresql://app:app@postgres:5432/social}
      USER_SERVICE_URL: http://user-service:8001
      POST_SERVICE_URL: http://post-service:8002
      FEED_SERVICE_URL: http://feed-service:8003
      NOTIFICATION_SERVICE_URL: http://notification-service:8004
      HEALING_AGENT_URL: http://healing-agent:8005
      PROMETHEUS_URL: http://prometheus:9090
      ADMIN_TOKEN: ${ADMIN_TOKEN:-dev-admin-token}
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      user-service:
        condition: service_started
      post-service:
        condition: service_started
      feed-service:
        condition: service_started
      notification-service:
        condition: service_started
      healing-agent:
        condition: service_started
      prometheus:
        condition: service_started

  prometheus:
    image: prom/prometheus:v2.53.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro

  grafana:
    image: grafana/grafana:11.1.0
    profiles:
      - dashboard
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  postgres-data:
  grafana-data:
